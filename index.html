<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <title>sloučení duplicit (Excel)</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

  <style>
    body{
      margin:0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg,#0f172a,#1e293b);
      color:#fff;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .box{
      width:100%;
      max-width:900px;
      background:#0b1220;
      border:1px solid rgba(255,255,255,0.08);
      border-radius:16px;
      padding:28px;
      box-shadow:0 20px 60px rgba(0,0,0,0.5);
    }

    h2{ margin-top:0; }

    p{ color:#cbd5e1; font-size:14px; }

    .upload{
      margin-top:16px;
      padding:30px;
      border:2px dashed rgba(255,255,255,0.2);
      border-radius:12px;
      text-align:center;
      background:rgba(255,255,255,0.02);
      cursor:pointer;
    }

    .upload:hover{
      border-color:#38bdf8;
      background:rgba(56,189,248,0.08);
    }

    .upload.success{
      border-color:#22c55e;
      background:rgba(34,197,94,0.12);
    }

    input[type="file"]{ display:none; }

    button{
      margin-top:16px;
      width:100%;
      padding:12px;
      border:none;
      border-radius:10px;
      background:linear-gradient(90deg,#38bdf8,#6366f1);
      color:white;
      font-weight:bold;
      cursor:pointer;
    }

    a{
      display:inline-block;
      margin-top:16px;
      padding:10px 14px;
      background:#10b981;
      color:white;
      text-decoration:none;
      border-radius:8px;
    }

    #status{
      margin-top:12px;
      font-size:13px;
      color:#94a3b8;
    }

    #status.success{
      color:#22c55e;
      font-weight:bold;
    }

    .filename{
      margin-top:12px;
      width:100%;
      padding:12px;
      border-radius:10px;
      border:1px solid rgba(255,255,255,0.2);
      background:#0f172a;
      color:white;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>sloučení duplicit</h2>
  <p>Mazání duplicit</p>

  <div class="upload" id="dropZone">
    <p id="uploadText"><b>Klikni nebo přetáhni Excel</b></p>
    <p style="font-size:12px;opacity:0.7">Soubor se nahraje automaticky</p>
    <input type="file" id="fileInput" accept=".xlsx,.csv,.txt,.xls">
  </div>

  <div id="status"></div>

  <button onclick="processFile()">Zpracovat Excel</button>

  <a id="downloadLink" style="display:none"></a>

  <input class="filename" id="fileNameInput" placeholder="Název souboru" />
</div>

<script>

const dropZone=document.getElementById('dropZone');
const fileInput=document.getElementById('fileInput');
const status=document.getElementById('status');
const uploadText=document.getElementById('uploadText');
const fileNameInput=document.getElementById('fileNameInput');

dropZone.onclick=()=>fileInput.click();

dropZone.ondragover=e=>e.preventDefault();

dropZone.ondrop=e=>{
  e.preventDefault();
  fileInput.files=e.dataTransfer.files;
  onFileLoaded();
};

fileInput.onchange=onFileLoaded;

function onFileLoaded(){
  if(!fileInput.files[0])return;

  dropZone.classList.add('success');
  uploadText.innerHTML="✔ Soubor nahrán";
  status.innerHTML="Můžeš zpracovat data.";
  status.classList.add('success');

  fileNameInput.value=fileInput.files[0].name.replace(/\.[^/.]+$/,"");
}

/* ===== NORMALIZACE ===== */
function norm(v){
  return (v||'').toString().trim().toLowerCase();
}

/* ===== SCORE ===== */
function score(a,b){
  let s=0;

  if(norm(a[1])===norm(b[1])) s++;
  if(norm(a[2])===norm(b[2])) s++;
  if(norm(a[3])===norm(b[3])) s++;
  if(norm(a[4])===norm(b[4])) s++;
  if(norm(a[5])===norm(b[5])) s++;

  return s;
}

/* ===== GROUPING ===== */
function find(x,p){
  if(p[x]!==x)p[x]=find(p[x],p);
  return p[x];
}

function union(x,y,p){
  let rx=find(x,p), ry=find(y,p);
  if(rx!==ry)p[ry]=rx;
}

function mergeGroups(data){
  const n=data.length;
  const p={};

  for(let i=0;i<n;i++)p[i]=i;

  for(let i=0;i<n;i++){
    for(let j=i+1;j<n;j++){
      if(score(data[i],data[j])>=3){
        union(i,j,p);
      }
    }
  }

  const groups={};

  for(let i=0;i<n;i++){
    let r=find(i,p);
    if(!groups[r])groups[r]=[];
    groups[r].push(data[i]);
  }

  const result=[];

  Object.values(groups).forEach(g=>{
    const merged=[];
    for(let c=0;c<g[0].length;c++){
      const set=new Set();
      g.forEach(r=>{if(r[c])set.add(r[c]);});
      merged[c]=Array.from(set).join(', ');
    }
    result.push(merged);
  });

  return result;
}

/* ===== PROCESS ===== */
function processFile(){
  const file=fileInput.files[0];
  if(!file)return alert('Nahraj soubor');

  const reader=new FileReader();

  reader.onload=function(e){
    let rows;

    if(file.name.endsWith('.xlsx')){
      const wb=XLSX.read(e.target.result,{type:'binary'});
      const ws=wb.Sheets[wb.SheetNames[0]];
      rows=XLSX.utils.sheet_to_json(ws,{header:1});
    }else{
      rows=e.target.result.split('\n').map(r=>r.split(/,|\t/));
    }

    let merged = mergeGroups(rows);

/* oddělení hlavičky */
const header = merged[0];
const dataRows = merged.slice(1);

/* řazení pouze dat */
dataRows.sort((a,b)=>(a[2]||'').localeCompare(b[2]||''));

/* vrácení hlavičky nahoru */
merged = [header, ...dataRows];

    const ws=XLSX.utils.aoa_to_sheet(merged);
ws['!cols'] = merged[0].map((_, colIndex) => {
  let maxLength = 10;

  merged.forEach(row => {
    const val = row[colIndex] ? row[colIndex].toString().length : 0;
    if (val > maxLength) maxLength = val;
  });

  return { wch: maxLength + 2 };
});

    /* ===== FILTER ===== */
    ws['!autofilter']={ref:XLSX.utils.encode_range({
      s:{r:0,c:0},
      e:{r:merged.length,c:merged[0].length}
    })};

    /* ===== FREEZE HEADER ===== */
    ws['!freeze']={xSplit:0,ySplit:1};

    const wb=XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb,ws,'Výsledek');

    const out=XLSX.write(wb,{bookType:'xlsx',type:'binary'});

    const blob=new Blob([new Uint8Array([...out].map(c=>c.charCodeAt(0)))],{
      type:'application/octet-stream'
    });

    const url=URL.createObjectURL(blob);

    const link=document.getElementById('downloadLink');
    const name=fileNameInput.value.trim()||'vycisteno';

    link.href=url;
    link.download=name+'.xlsx';
    link.style.display='inline-block';
    link.innerText='Stáhnout výsledek ✔';
  };

  if(file.name.endsWith('.xlsx'))
    reader.readAsBinaryString(file);
  else
    reader.readAsText(file);
}

</script>

</body>
</html>
